################################################################################
# PHASE MANAGER V3
################################################################################

hems_phase_manager:

  alias: HEMS - Phase Manager

  mode: restart

  variables:

    current: >
      {{ states('sensor.hems_charge_current') | int(6) }}

    delta: >
      {{ states('sensor.hems_power_delta') | float(0) }}

    phase: >
      {{ states('select.goe_082888_psm') | int(1) }}

    cooldown: 120

    last_change: >
      {{ as_timestamp(states('input_datetime.hems_last_phase_change')) | default(0) }}

    elapsed: >
      {{ now().timestamp() - last_change }}

  sequence:

    ###########################################################################
    # Cooldown
    ###########################################################################

    - if:
        - condition: template
          value_template: "{{ elapsed < cooldown }}"
      then:

        - action: script.hems_log
          data:
            message: >
              PhaseManager |
              Cooldown aktiv ({{ elapsed|int }}s)

        - stop: Cooldown aktiv

    ###########################################################################
    # 1 -> 3 Phasen
    ###########################################################################

    - if:
        - condition: template
          value_template: >
            {{
              phase == 1
              and current >= 16
              and delta > 800
            }}

      then:

        - action: script.hems_log
          data:
            message: >
              PhaseManager |
              Wechsel auf 3 Phasen

        - service: select.select_option
          target:
            entity_id: select.goe_082888_psm
          data:
            option: "2"

        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.hems_last_phase_change
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

        - stop: Wechsel auf 3 Phasen abgeschlossen

    ###########################################################################
    # 3 -> 1 Phase
    ###########################################################################

    - if:
        - condition: template
          value_template: >
            {{
              phase == 2
              and current <= 6
              and delta < -500
            }}

      then:

        - action: script.hems_log
          data:
            message: >
              PhaseManager |
              Wechsel auf 1 Phase

        - service: select.select_option
          target:
            entity_id: select.goe_082888_psm
          data:
            option: "1"

        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.hems_last_phase_change
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

        - stop: Wechsel auf 1 Phase abgeschlossen

    ###########################################################################
    # Keine Umschaltung notwendig
    ###########################################################################

    - action: script.hems_log
      data:
        message: >
          PhaseManager |
          Keine Phasenumschaltung erforderlich
