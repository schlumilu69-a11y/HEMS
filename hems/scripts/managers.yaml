################################################################################
# START MANAGER
################################################################################

hems_start_manager:

  alias: HEMS - Start Manager

  mode: single

  variables:

    charging: >
      {{ is_state('binary_sensor.hems_charging_active','on') }}

    delta: >
      {{ states('sensor.hems_power_delta') | float(0) }}

    start_power: >
      {{ states('input_number.hems_start_power') | float(1500) }}

  sequence:

    # Lädt bereits?
    - if:
        - condition: template
          value_template: "{{ charging }}"
      then:
        - stop: Charging already active

    # Genug Überschuss vorhanden?
    - if:
        - condition: template
          value_template: "{{ delta >= start_power }}"
      then:

        - action: script.hems_log
          data:
            message: >
              Start Manager:
              Delta={{ delta }}W
              Start={{ start_power }}W

        - action: script.hems_charge_start

################################################################################
# POWER MANAGER
################################################################################

hems_power_manager:

  alias: HEMS - Power Manager

  mode: restart

  variables:

    current: >
      {{ states('sensor.hems_charge_current') | int(6) }}

    delta: >
      {{ states('sensor.hems_power_delta') | float(0) }}

    deadband: >
      {{ states('input_number.hems_deadband') | float(150) }}

    step: >
      {{ states('input_number.hems_current_step') | int(1) }}

    min_current: >
      {{ states('input_number.hems_min_current') | int(6) }}

    max_current: >
      {{ states('input_number.hems_max_current') | int(16) }}

    hold_time: >
      {{ states('input_number.hems_current_hold_time') | int(120) }}

    last_change: >
      {{ as_timestamp(states('input_datetime.hems_last_current_change')) | default(0) }}

    elapsed: >
      {{ now().timestamp() - last_change }}

    target_current: >

      {% set c = current | int %}
      {% set d = delta | float %}
      {% set db = deadband | float %}
      {% set s = step | int %}

      {% if elapsed < hold_time %}
        {{ c }}

      {% elif d > db %}
        {{ [c + s, max_current] | min }}

      {% elif d < -db %}
        {{ [c - s, min_current] | max }}

      {% else %}
        {{ c }}

      {% endif %}

  sequence:

    - action: script.hems_log
      data:
        message: >
          Power Manager:
          Delta={{ delta }}W
          Current={{ current }}A
          Target={{ target_current }}A

    - if:

        - condition: template
          value_template: >
            {{ target_current | int != current | int }}

      then:

        - action: script.hems_current_set
          data:
            ampere: "{{ target_current }}"

        - action: script.hems_log
          data:
            message: >
              Current changed to {{ target_current }} A

      else:

        - action: script.hems_log
          data:
            message: >
              Current unchanged
################################################################################
# STOP MANAGER
################################################################################

hems_stop_manager:

  alias: HEMS - Stop Manager

  mode: single

  variables:

    charging: >
      {{ is_state('binary_sensor.hems_charging_active','on') }}

    delta: >
      {{ states('sensor.hems_power_delta') | float(0) }}

    stop_power: >
      {{ states('input_number.hems_stop_power') | float(800) }}

  sequence:

    - if:
        - condition: template
          value_template: "{{ not charging }}"
      then:
        - stop: Not charging

    - if:
        - condition: template
          value_template: "{{ delta < stop_power }}"
      then:

        - action: script.hems_log
          data:
            message: >
              Stop Manager:
              Delta={{ delta }}W

        - action: script.hems_charge_stop

################################################################################
# PHASE MANAGER
################################################################################

hems_phase_manager:

  alias: HEMS - Phase Manager

  mode: restart

  variables:

    charging: >
      {{ is_state('binary_sensor.hems_charging_active','on') }}

    available_power: >
      {{ states('sensor.hems_available_power') | float(0) }}

    switch_power: >
      {{ states('input_number.hems_phase_switch_power') | float(4200) }}

  sequence:

    - if:
        - condition: template
          value_template: "{{ not charging }}"
      then:
        - stop: Vehicle not charging

    - if:
        - condition: template
          value_template: >
            {{ available_power >= switch_power }}
      then:

        - action: script.hems_phase_three

      else:

        - action: script.hems_phase_single
