################################################################################
# HEMS CONTROLLER V3
################################################################################

hems_controller:

  alias: HEMS - Main Controller

  mode: single

  sequence:

    ###########################################################################
    # Startbedingungen prüfen
    ###########################################################################

    - action: script.hems_start_manager

    ###########################################################################
    # Nur wenn geladen wird
    ###########################################################################

    - if:
        - condition: state
          entity_id: binary_sensor.hems_charging_active
          state: "on"

      then:

        #######################################################################
        # 1. Leistung regeln
        #######################################################################

        - action: script.hems_power_manager

        #######################################################################
        # 2. Danach ggf. Phase wechseln
        #######################################################################

        - action: script.hems_phase_manager

        #######################################################################
        # 3. Prüfen ob gestoppt werden muss
        #######################################################################

        - action: script.hems_stop_manager

    ###########################################################################
    # Controller-Zeit aktualisieren
    ###########################################################################

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hems_last_controller_run
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
