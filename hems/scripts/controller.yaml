################################################################################
#
# HEMS - Home Energy Management System
#
# Version : 0.2.0-beta
#
# Datei : controller.yaml
#
################################################################################

################################################################################
# MAIN CONTROLLER
################################################################################

hems_controller:

  alias: HEMS - Main Controller

  mode: single

  sequence:

    ###########################################################################
    # Controller started
    ###########################################################################

    - action: script.hems_log
      data:
        message: "Controller cycle started"

    ###########################################################################
    # Debounce
    ###########################################################################

    - variables:

        debounce_time: 10

        last_run: >
          {% set ts = as_timestamp(states('input_datetime.hems_last_controller_run')) %}
          {{ ts if ts is not none else 0 }}

        elapsed: >
          {{ now().timestamp() - last_run }}

    - if:

        - condition: template
          value_template: "{{ elapsed < debounce_time }}"

      then:

        - action: script.hems_log
          data:
            message: >
              Controller skipped (Debounce {{ elapsed | round(1) }} s)

        - stop: Debounce active

    ###########################################################################
    # HEMS enabled?
    ###########################################################################

    - if:

        - condition: state
          entity_id: binary_sensor.hems_enabled
          state: "off"

      then:

        - action: script.hems_log
          data:
            message: "HEMS disabled"

        - stop: HEMS disabled

    ###########################################################################
    # Vehicle connected?
    ###########################################################################

    - if:

        - condition: state
          entity_id: binary_sensor.hems_vehicle_connected
          state: "off"

      then:

        - action: script.hems_log
          data:
            message: "No vehicle connected"

        - stop: No vehicle connected

    ###########################################################################
    # Start Manager
    ###########################################################################

    - action: script.hems_start_manager

    ###########################################################################
    # Continue only while charging
    ###########################################################################

    - if:

        - condition: state
          entity_id: binary_sensor.hems_charging_active
          state: "on"

      then:

        #######################################################################
        # Phase Manager
        #######################################################################

        - action: script.hems_phase_manager

        #######################################################################
        # Power Manager
        #######################################################################

        - action: script.hems_power_manager

        #######################################################################
        # Stop Manager
        #######################################################################

        - action: script.hems_stop_manager

      else:

        - action: script.hems_log
          data:
            message: "Charging not active"

    ###########################################################################
    # Store last controller run
    ###########################################################################

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hems_last_controller_run
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    ###########################################################################
    # Finished
    ###########################################################################

    - action: script.hems_log
      data:
        message: "Controller cycle finished"
