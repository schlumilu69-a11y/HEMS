################################################################################
#
# HEMS - Home Energy Management System
#
# Version : 0.1.0-alpha
#
# Datei : scripts.yaml
#
# Beschreibung:
# Hardware-Abstraktionsschicht zwischen HEMS und der Wallbox.
#
################################################################################

###############################################################################
# LOGGING
###############################################################################

hems_log:
  alias: HEMS - Log
  description: Schreibt einen Eintrag in das Home Assistant Logbuch.

  fields:
    message:
      description: Lognachricht

  sequence:
    - action: logbook.log
      data:
        name: HEMS
        message: "{{ message }}"

###############################################################################
# START CHARGING
###############################################################################

hems_charge_start:
  alias: HEMS - Charge Start

  sequence:

    - action: script.hems_phase_single

    - action: script.hems_set_current
      data:
        ampere: "{{ states('input_number.hems_min_ampere') | int }}"

    - action: script.hems_charge_resume

    - action: script.hems_log
      data:
        message: "Charging started"

###############################################################################
# STOP CHARGING
###############################################################################

hems_charge_stop:
  alias: HEMS - Charge Stop

  sequence:

    - action: select.select_option
      target:
        entity_id: select.goe_082888_frc
      data:
        option: "1"

    - action: script.hems_log
      data:
        message: "Charging stopped"

###############################################################################
# PAUSE CHARGING
###############################################################################

hems_charge_pause:
  alias: HEMS - Charge Pause

  sequence:

    - action: select.select_option
      target:
        entity_id: select.goe_082888_frc
      data:
        option: "0"

    - action: script.hems_log
      data:
        message: "Charging paused"

###############################################################################
# RESUME CHARGING
###############################################################################

hems_charge_resume:
  alias: HEMS - Charge Resume

  sequence:

    - action: select.select_option
      target:
        entity_id: select.goe_082888_frc
      data:
        option: "2"

    - action: script.hems_log
      data:
        message: "Charging resumed"

###############################################################################
# SET CHARGING CURRENT
###############################################################################

hems_set_current:
  alias: HEMS - Set Current

  fields:
    ampere:
      description: Zielstrom

  sequence:

    - variables:

        current: >
          {% set a = ampere | int(6) %}

          {% if a < 6 %}
            6
          {% elif a > 16 %}
            16
          {% else %}
            {{ a }}
          {% endif %}

    - action: number.set_value
      target:
        entity_id: number.goe_082888_amp
      data:
        value: "{{ current }}"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hems_last_current_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: script.hems_log
      data:
        message: "Charging current set to {{ current }} A"

###############################################################################
# SINGLE PHASE
###############################################################################

hems_phase_single:
  alias: HEMS - Single Phase

  sequence:

    - condition: template
      value_template: >
        {{ states('select.goe_082888_psm') != '1' }}

    - action: select.select_option
      target:
        entity_id: select.goe_082888_psm
      data:
        option: "1"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hems_last_phase_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: script.hems_log
      data:
        message: "Switched to single phase"

###############################################################################
# THREE PHASE
###############################################################################

hems_phase_three:
  alias: HEMS - Three Phase

  sequence:

    - condition: template
      value_template: >
        {{ states('select.goe_082888_psm') != '2' }}

    - action: select.select_option
      target:
        entity_id: select.goe_082888_psm
      data:
        option: "2"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hems_last_phase_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: script.hems_log
      data:
        message: "Switched to three phase"

###############################################################################
# AUTO PHASE
###############################################################################

hems_phase_auto:
  alias: HEMS - Auto Phase

  sequence:

    - condition: template
      value_template: >
        {{ states('select.goe_082888_psm') != '0' }}

    - action: select.select_option
      target:
        entity_id: select.goe_082888_psm
      data:
        option: "0"

    - action: script.hems_log
      data:
        message: "Automatic phase mode enabled"
