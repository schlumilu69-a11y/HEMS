template:

  - sensor:

      - name: HEMS PV Überschuss
        unit_of_measurement: W

        state: >
          {% set grid = states('sensor.shelly_3em_power')|float(0) %}
          {% set reserve = states('input_number.hems_power_reserve')|float(300) %}
          {{ max((-grid)-reserve,0)|round(0) }}

      - name: HEMS Target Current

        unit_of_measurement: A

        state: >

          {% set surplus =
             states('sensor.hems_pv_uberschuss')|float(0) %}

          {% set amp = surplus / 230 %}

          {% set amp =
             [amp,
              states('input_number.hems_max_current')|float]|min %}

          {% set amp =
             [amp,
              states('input_number.hems_min_current')|float]|max %}

          {{ amp|round(0) }}
